apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: alloy
      version: "0.9.2"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 12h
  values:
    controller:
      type: deployment

    alloy:
      configMap:
        content: |
          // ---- METRICS ----

          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pods_metrics" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
              action        = "keep"
              regex         = "true"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
              action        = "replace"
              target_label  = "__metrics_path__"
              regex         = "(.+)"
            }
            rule {
              source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
              action        = "replace"
              regex         = "([^:]+)(?::\\d+)?;(\\d+)"
              replacement   = "$1:$2"
              target_label  = "__address__"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app"]
              target_label  = "app"
            }
          }

          prometheus.scrape "pods" {
            targets    = discovery.relabel.pods_metrics.output
            forward_to = [prometheus.remote_write.mimir.receiver]
            job_name   = "kubernetes-pods"
          }

          prometheus.scrape "kube_state_metrics" {
            targets    = [{"__address__" = "kube-state-metrics.monitoring:8080"}]
            forward_to = [prometheus.remote_write.mimir.receiver]
            job_name   = "kube-state-metrics"
          }

          discovery.kubernetes "nodes" {
            role = "node"
          }

          discovery.relabel "cadvisor" {
            targets = discovery.kubernetes.nodes.targets

            rule {
              target_label = "__address__"
              replacement  = "kubernetes.default.svc.cluster.local:443"
            }
            rule {
              source_labels = ["__meta_kubernetes_node_name"]
              regex         = "(.+)"
              target_label  = "__metrics_path__"
              replacement   = "/api/v1/nodes/$1/proxy/metrics/cadvisor"
            }
          }

          prometheus.scrape "cadvisor" {
            targets    = discovery.relabel.cadvisor.output
            forward_to = [prometheus.remote_write.mimir.receiver]
            job_name   = "kubernetes-cadvisor"
            scheme     = "https"

            authorization {
              credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
            }

            tls_config {
              ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              insecure_skip_verify = false
            }
          }

          prometheus.remote_write "mimir" {
            endpoint {
              url = "http://mimir-nginx.monitoring:80/api/v1/push"
            }
          }

          // ---- LOGS ----

          discovery.kubernetes "pods_logs" {
            role = "pod"
          }

          discovery.relabel "pods_logs" {
            targets = discovery.kubernetes.pods_logs.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
              separator     = "/"
              target_label  = "job"
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods_logs.output
            forward_to = [loki.write.loki.receiver]
          }

          loki.write "loki" {
            endpoint {
              url = "http://loki.monitoring:3100/loki/api/v1/push"
            }
          }
